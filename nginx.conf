server {
    listen 80;
    server_name _;

    # Raíz donde están los archivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    # Soporte para React Router (Single Page Application)
    # Redirige cualquier ruta no encontrada a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching para archivos estáticos (JS, CSS)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Caching para imágenes y otros recursos públicos
    location ~* \.(?:webp|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|otf|mp4|webm|wav|mp3|m4a|aac|oga)$ {
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy para las peticiones a la API
    location /api/ {
        # 'lumins-api' es el nombre del servicio del backend en docker-compose
        proxy_pass http://lumins-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy para Socket.io (WebSockets)
    location /socket.io/ {
        proxy_pass http://lumins-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
